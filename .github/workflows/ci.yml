name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        puppet: ['7', '8']
    steps:
      - uses: actions/checkout@v5

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Validate syntax
        run: bundle exec rake validate

      - name: Run puppet-lint
        run: bundle exec rake lint

      - name: Run unit tests
        run: bundle exec rake spec
        env:
          PUPPET_GEM_VERSION: "~> ${{ matrix.puppet }}.0"

  metadata:
    name: Check metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Validate metadata.json
        run: |
          ruby -e "
            require 'json'
            meta = JSON.parse(File.read('metadata.json'))
            %w[name version author summary license source].each do |key|
              raise \"Missing required field: #{key}\" unless meta[key] && !meta[key].empty?
            end
            puts 'metadata.json is valid.'
          "
